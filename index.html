<!DOCTYPE html>
<html>
<head>
<title>Number Guessing Game</title>
</head>

<body>

<h1>Number Guessing Game</h1>
<p>Guess a number between 0 and 100. You have 5 guesses.</p>

<input id="guess" type="number">
<button onclick="checkGuess()">Submit Guess</button>

<p id="result"></p>

<script>

let LOWER_BOUND = 0;
let UPPER_BOUND = 100;
let GUESS_LIMIT = 5;

let correctNumber = Math.floor(Math.random() * (UPPER_BOUND + 1));
let guessCounter = 0;

function checkGuess() {

    let guess = Number(document.getElementById("guess").value);
    guessCounter++;

    let remaining = GUESS_LIMIT - guessCounter;

    if (guess === correctNumber) {
        document.getElementById("result").innerText =
        "Wow, you got it in " + guessCounter + " guesses!";
    }

    else if (remaining === 0) {
        document.getElementById("result").innerText =
        "Game over! The number was " + correctNumber;
    }

    else if (guess < correctNumber) {
        document.getElementById("result").innerText =
        "Too low! Guesses remaining: " + remaining;
    }

    else {
        document.getElementById("result").innerText =
        "Too high! Guesses remaining: " + remaining;
    }

}

</script>

</body>
</html>
